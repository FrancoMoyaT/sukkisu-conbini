<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contacto | SUKKISU CONBINI</title>

    <link rel="stylesheet" href="./style.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header>

        <div class="caja">

            <h1>
                <img src="./logo.png" alt="Logo Sukkisu Conbini">
            </h1>

            <nav>
                <ul>
                    <li><a href="./index.html">Home</a></li>
                    <li><a href="./productos.html">Productos</a></li>
                    <li><a href="./contacto.html">Contacto</a></li>
                </ul>
            </nav>

        </div>

    </header>

    <main>

        <form
            action="https://formspree.io/f/xbdbpzdq"
            method="POST"
        >

            <h2 class="titulo-princ">
                CONTACTO NEON
            </h2>

            <label for="nombreyapellido">
                Nombre y Apellido
            </label>

            <input
                type="text"
                id="nombreyapellido"
                name="nombre"
                class="input-padron"
                required
            >

            <label for="correoelectronico">
                Correo Electrónico
            </label>

            <input
                type="email"
                id="correoelectronico"
                name="email"
                class="input-padron"
                required
                placeholder="email@dominio.com"
            >

            <label for="telefono">
                Teléfono
            </label>

            <input
                type="tel"
                id="telefono"
                name="telefono"
                class="input-padron"
                required
                placeholder="11-2233-4455"
            >

            <label for="mensaje">
                Mensaje
            </label>

            <textarea
                id="mensaje"
                name="mensaje"
                cols="70"
                rows="10"
                class="input-padron"
                required>
            </textarea>

            <fieldset>

                <legend>
                    ¿Cómo le gustaría que lo contactemos?
                </legend>

                <label for="radio-email">

                    <input
                        type="radio"
                        name="contacto"
                        value="email"
                        id="radio-email"
                    >

                    Email

                </label>

                <label for="radio-telefono">

                    <input
                        type="radio"
                        name="contacto"
                        value="telefono"
                        id="radio-telefono"
                    >

                    Teléfono

                </label>

                <label for="radio-whatsapp">

                    <input
                        type="radio"
                        name="contacto"
                        value="whatsapp"
                        id="radio-whatsapp"
                        checked
                    >

                    WhatsApp

                </label>

            </fieldset>

            <label class="checkbox">

                <input
                    type="checkbox"
                    name="novedades"
                    checked
                >

                ¿Le gustaría recibir novedades?

            </label>

            <input
                type="submit"
                value="ENVIAR MENSAJE"
                class="enviar"
            >

        </form>

    </main>

    <footer>

        <p class="copyright">
            © SUKKISU CONBINI — NEON EXPERIENCE
        </p>

    </footer>

</body>

</html>
